name: leak-scan

# Server-side backstop: runs on every push/PR regardless of local hook setup,
# so a leak can't reach the public repo from a machine that never ran
# `git config core.hooksPath .githooks`.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      - name: Scan all tracked files for location leaks
        run: bash scripts/check-leaks.sh all
